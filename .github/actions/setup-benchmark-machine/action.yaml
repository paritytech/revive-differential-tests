name: Setup Benchmark Machine
description: Sets up the machine for benchmarks by installing system packages and optional compiler binaries.

inputs:
  solc-version:
    description: The version of solc to install on the machine (e.g. v0.8.28)
    required: false
  resolc-repository:
    description: The repository containing resolc.
    required: false
  resolc-ref:
    description: The branch, tag, or commit hash to use for the resolc repository.
    required: false

runs:
  using: composite
  steps:
    - name: Setup the Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        cache: false
        target: wasm32-unknown-unknown,wasm32v1-none
        components: rust-src

    - name: Setup Binary Directory
      shell: bash
      run: |
        BIN_DIR="$RUNNER_TEMP/benchmark-bin"
        mkdir -p "$BIN_DIR"
        echo "BIN_DIR=$BIN_DIR" >> "$GITHUB_ENV"
        echo "$BIN_DIR" >> "$GITHUB_PATH"

    - name: Install System Packages
      shell: bash
      run: |
        set -euo pipefail

        retry() {
          local attempt=1
          local max_attempts=5
          local delay=10

          until "$@"; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              return 1
            fi

            echo "Attempt $attempt/$max_attempts failed: $*"
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
        }

        apt_get() {
          sudo env DEBIAN_FRONTEND=noninteractive apt-get \
            -o Acquire::Retries=3 \
            -o DPkg::Lock::Timeout=600 \
            "$@"
        }

        (
          flock -w 600 9
          echo "deb [trusted=yes] https://sdk.kurtosis.com/kurtosis-cli-release-artifacts/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          retry apt_get update
          retry apt_get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            protobuf-compiler \
            lld \
            llvm \
            clang \
            libclang-dev \
            cmake \
            ninja-build \
            jq \
            kurtosis-cli
        ) 9>/tmp/revive-differential-tests-apt.lock

    - name: Installing Solc
      if: ${{ inputs.solc-version != '' }}
      shell: bash
      run: |
        curl -sSLo "$BIN_DIR/solc" \
          "https://github.com/ethereum/solidity/releases/download/${{ inputs.solc-version }}/solc-static-linux"
        chmod +x "$BIN_DIR/solc"

    - name: Installing Resolc
      if: ${{ inputs.resolc-repository != '' && inputs.resolc-ref != '' }}
      uses: ./.github/actions/install-resolc
      with:
        repository: ${{ inputs.resolc-repository }}
        ref: ${{ inputs.resolc-ref }}

    - name: Wait for Docker to start
      shell: bash
      run: |
        set -euo pipefail

        if ! docker info > /dev/null 2>&1; then
          sudo dockerd &
          for i in $(seq 1 15); do
            docker info > /dev/null 2>&1 && break
            sleep 1
          done
        fi

        docker info
        sudo chmod 666 /var/run/docker.sock

    - name: Start Kurtosis
      shell: bash
      run: |
        set -euo pipefail

        for attempt in $(seq 1 5); do
          if kurtosis engine start; then
            exit 0
          fi

          if [ "$attempt" -eq 5 ]; then
            exit 1
          fi

          kurtosis engine stop || true
          sleep $((attempt * 15))
        done
