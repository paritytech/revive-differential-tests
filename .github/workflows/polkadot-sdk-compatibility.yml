# Exercises the relevant GH action the same way polkadot-sdk does, but against
# this repo's current working tree and polkadot-sdk's master branch, to catch
# breaking changes before polkadot-sdk bumps the revive-differential-tests commit it pins.
name: Polkadot SDK Compatibility

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-config:
    runs-on: ubuntu-24.04
    # Checking that the same set of tests which fail in the polkadot-sdk repo also fail with the 
    # latest version of retester is very hard for many different reasons. An example of it is that
    # is a bug I fixed in a recent commit where specifying the `--base-path` to an older version of
    # solc leads the compilation to fail. The polkadot-sdk treats these as expected failures, but
    # the bug that was causing them has been fixed and therefore we no longer expect them to fail.
    # 
    # In addition to the above, divergences from the expectations in the polkadot-sdk can happen if
    # we disable certain tests which we determine are impossible to succeed such as the tests which
    # are failing with OOG when they're compiled without any optimizations. In that case, again, 
    # the polkadot-sdk expectations expect that these tests are in the failure set when they no 
    # longer are as they've been ignored.
    # 
    # An additional concern is that we can't just update the polkadot-sdk each time we update
    # retester to ensure that the failure set matches as it makes the process of merging anything
    # into retester much longer and makes it span across multiple repos just to get a simple "ignore
    # this test PR" to be merged.
    # 
    # We need to discuss the best way for us to handle this and what would be a good approach to be
    # notified of such divergences without it making the CI red.
    if: false
    outputs:
      image: ${{ steps.config.outputs.image }}
      resolc-version: ${{ steps.config.outputs.resolc-version }}
      polkadot-sdk-sha: ${{ steps.config.outputs.polkadot-sdk-sha }}
    steps:
      - name: Checkout the Polkadot SDK CI environment
        uses: actions/checkout@v6
        with:
          repository: paritytech/polkadot-sdk
          ref: master
          sparse-checkout: .github

      - name: Resolve Polkadot SDK configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          source .github/env
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "resolc-version=$RESOLC_VERSION" >> "$GITHUB_OUTPUT"
          echo "polkadot-sdk-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  differential-tests:
    needs: resolve-config
    runs-on: parity-large-persistent
    timeout-minutes: 60
    container:
      image: ${{ needs.resolve-config.outputs.image }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - revive-dev-node-revm-solc
          - revive-dev-node-polkavm-resolc
    steps:
      - name: Checkout revive-differential-tests
        uses: actions/checkout@v6
        with:
          path: revive-differential-tests
          submodules: recursive

      - name: Checkout the Polkadot SDK
        uses: actions/checkout@v6
        with:
          repository: paritytech/polkadot-sdk
          ref: ${{ needs.resolve-config.outputs.polkadot-sdk-sha }}
          path: polkadot-sdk

      - name: Configure forklift
        shell: bash
        run: |
          mkdir -p .forklift
          cp polkadot-sdk/.forklift/config.toml .forklift/config.toml

      - name: Download resolc
        id: resolc
        shell: bash
        env:
          RESOLC_VERSION: ${{ needs.resolve-config.outputs.resolc-version }}
        run: |
          set -euo pipefail
          INSTALL_DIR="/usr/local/bin"
          curl -fsSL --retry 3 -o "$INSTALL_DIR/resolc" "https://github.com/paritytech/revive/releases/download/v${RESOLC_VERSION}/resolc-x86_64-unknown-linux-musl"
          chmod +x "$INSTALL_DIR/resolc"
          resolc --version
          echo "resolc-path=$INSTALL_DIR/resolc" >> "$GITHUB_OUTPUT"

      - name: Run the differential tests
        uses: ./revive-differential-tests/.github/actions/run-differential-tests
        with:
          platform: ${{ matrix.platform }}
          revive-differential-tests-path: revive-differential-tests
          polkadot-sdk-path: polkadot-sdk
          cargo-command: "forklift cargo"
          resolc-path: ${{ steps.resolc.outputs.resolc-path }}
          expectations-file-path: polkadot-sdk/.github/assets/${{ matrix.platform }}.json
