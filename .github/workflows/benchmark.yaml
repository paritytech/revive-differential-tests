name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      report-name:
        description: Optional display name for the generated HTML report.
        required: false
        type: string
      report-description:
        description: Optional description for the generated HTML report.
        required: false
        type: string
      polkadot-sdk-repository:
        description: The repository containing the polkadot-sdk
        required: true
        default: paritytech/polkadot-sdk
      polkadot-sdk-ref:
        description: The branch, tag, or commit hash to use for the polkadot-sdk repository.
        required: true
        default: 22e63b740b6943b4e39a3c6b779ca9e5408ca00c
      use-jit:
        description: Whether to build the polkadot-sdk with JIT enabled (--cfg revive_jit).
        required: true
        type: boolean
        default: false
      runtimes-repository:
        description: The repository containing the runtimes and their spec generator
        required: true
        default: polkadot-fellows/runtimes
      runtimes-ref:
        description: The branch, tag, or commit hash to use for the runtimes repository.
        required: true
        default: 80e121412d9787a56c7f63cfdc65fb2c54989dbc
      solc-version:
        description: Solc compiler version (e.g. v0.8.28)
        required: true
        default: v0.8.28
      resolc-repository:
        description: The repository containing the resolc compiler
        required: true
        default: paritytech/revive
      resolc-ref:
        description: The branch, tag, or commit hash to use for the resolc repository.
        required: true
        default: v1.2.0
      network:
        description: The Asset Hub network configuration to benchmark against
        required: true
        type: choice
        default: westend
        options:
          - polkadot
          - westend
      additional-keys:
        description: Number of additional wallet keys to pre-seed at genesis
        required: true
        default: "201000"
      rust-toolchain:
        description: Rust toolchain version
        required: true
        default: "1.93.0"
      rust-log:
        description: The value to set to the `RUST_LOG` environment variable when the benchmarks run
        required: true
        default: info,alloy=off
      override-repetition-count:
        type: number
        description: A way for the repetition count to be overridden. This is only used when we want to quickly run the CI to check if it works, please do not use it otherwise
        required: false
      test-specifier-filters:
        description: Optional comma or newline-separated substrings for benchmark test specifiers. Empty runs all test specifiers.
        required: false
        type: string
        default: ""
      platform-filters:
        description: Optional comma or newline-separated substrings for benchmark platform identifiers. Empty runs all platforms.
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: ${{ inputs.rust-log }}

permissions:
  contents: write

jobs:
  # ============================================================================================
  # Build Jobs: Building the binaries we need and making sure that they're cached and available
  # ============================================================================================

  build-retester:
    name: Build and Cache Retester Binaries
    runs-on: parity-large-t2d
    steps:
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
      - name: Build Retester
        uses: ./.github/actions/require-binary
        with:
          binary-name: retester
          repository: paritytech/revive-differential-tests
          ref: ${{ github.ref_name }}
          profile: production
          packages: |
            revive-dt-core
            revive-dt-report-processor

  build-chainspec-generator:
    name: Build and Cache Runtime's Chainspec Generator
    runs-on: parity-large-t2d
    steps:
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
      - name: Build chain-spec-generator
        uses: ./.github/actions/require-binary
        with:
          binary-name: chain-spec-generator
          repository: ${{ inputs.runtimes-repository }}
          ref: ${{ inputs.runtimes-ref }}
          profile: production
          packages: chain-spec-generator
          features: |
            polkadot
            asset-hub-polkadot
          no-default-features: true
          env: |
            RUSTFLAGS=-Awarnings
            WASM_BUILD_RUSTFLAGS=-Clink-arg=--allow-undefined

  build-polkadot-sdk:
    name: Build and Cache the Polkadot SDK Dependencies
    runs-on: parity-large-t2d
    steps:
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
      - name: Build polkadot
        uses: ./.github/actions/require-binary
        with:
          binary-name: polkadot
          repository: ${{ inputs.polkadot-sdk-repository }}
          ref: ${{ inputs.polkadot-sdk-ref }}
          profile: production
          packages: |
            polkadot
            polkadot-parachain-bin
            pallet-revive-eth-rpc
          env: |
            ${{ inputs.use-jit && 'RUSTFLAGS=-Awarnings --cfg revive_jit' || 'RUSTFLAGS=-Awarnings' }}
            WASM_BUILD_RUSTFLAGS=-Clink-arg=--allow-undefined

  build-resolc:
    name: Build and Cache Resolc Binary
    runs-on: parity-large-t2d
    steps:
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
          resolc-repository: ${{ inputs.resolc-repository }}
          resolc-ref: ${{ inputs.resolc-ref }}

  # ====================================================================
  # Matrix Generation Job: Builds a Matrix of all the workloads we have
  # ====================================================================

  generate-matrix:
    name: Generate Benchmark Matrix
    needs: build-retester
    runs-on: parity-large-t2d
    outputs:
      tests: ${{ steps.matrix.outputs.tests }}
      platforms: ${{ steps.matrix.outputs.platforms }}
      benchmark-count: ${{ steps.matrix.outputs.benchmark-count }}
    steps:
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
      - name: Build Retester
        uses: ./.github/actions/require-binary
        with:
          binary-name: retester
          repository: paritytech/revive-differential-tests
          ref: ${{ github.ref_name }}
          profile: production
          packages: |
            revive-dt-core
            revive-dt-report-processor
      - name: Checkout resolc-compiler-tests
        uses: actions/checkout@v4
        with:
          repository: paritytech/resolc-compiler-tests
          path: compiler-tests
      - name: Export test specifiers
        id: matrix
        env:
          RUST_LOG: "off"
          TEST_SPECIFIER_FILTERS: ${{ inputs.test-specifier-filters }}
          PLATFORM_FILTERS: ${{ inputs.platform-filters }}
        run: |
          set -euo pipefail

          parse_filters() {
            jq -n -c --arg filters "$1" '
              $filters
              | gsub("\r\n"; "\n")
              | gsub("\r"; "\n")
              | split("\n")
              | map(split(","))
              | flatten
              | map(gsub("^\\s+|\\s+$"; ""))
              | map(select(length > 0))
            '
          }

          TEST_FILTERS=$(parse_filters "$TEST_SPECIFIER_FILTERS")
          PLATFORM_FILTERS_JSON=$(parse_filters "$PLATFORM_FILTERS")

          ALL_TESTS=$(retester export-test-specifiers \
            --test ./compiler-tests/fixtures/solidity/workloads)
          ALL_PLATFORMS='["zombienet-revm-solc","zombienet-polkavm-resolc","lighthouse-geth-evm-solc"]'

          TESTS=$(jq -c --argjson filters "$TEST_FILTERS" '
            if ($filters | length) == 0 then
              .
            else
              map(select(.specifier as $specifier |
                any($filters[]; . as $filter | $specifier | contains($filter))))
            end
          ' <<< "$ALL_TESTS")
          PLATFORMS=$(jq -c --argjson filters "$PLATFORM_FILTERS_JSON" '
            if ($filters | length) == 0 then
              .
            else
              map(select(. as $platform |
                any($filters[]; . as $filter | $platform | contains($filter))))
            end
          ' <<< "$ALL_PLATFORMS")

          TEST_COUNT=$(jq 'length' <<< "$TESTS")
          PLATFORM_COUNT=$(jq 'length' <<< "$PLATFORMS")
          BENCHMARK_COUNT=$((TEST_COUNT * PLATFORM_COUNT))

          echo "Selected $TEST_COUNT test specifier(s) and $PLATFORM_COUNT platform(s)."
          echo "Benchmark matrix contains $BENCHMARK_COUNT job(s)."

          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"
          echo "benchmark-count=${BENCHMARK_COUNT}" >> "$GITHUB_OUTPUT"
      - name: Print generated benchmark matrix
        env:
          TESTS: ${{ steps.matrix.outputs.tests }}
          PLATFORMS: ${{ steps.matrix.outputs.platforms }}
          BENCHMARK_COUNT: ${{ steps.matrix.outputs.benchmark-count }}
        run: |
          set -euo pipefail

          TEST_COUNT=$(jq 'length' <<< "$TESTS")
          PLATFORM_COUNT=$(jq 'length' <<< "$PLATFORMS")

          echo "Generated benchmark matrix:"
          echo "  test specifiers: $TEST_COUNT"
          echo "  platforms: $PLATFORM_COUNT"
          echo "  benchmark jobs: $BENCHMARK_COUNT"

          echo "::group::Platforms"
          jq . <<< "$PLATFORMS"
          echo "::endgroup::"

          echo "::group::Test specifiers"
          jq -r '.[] | "\(.name) => \(.specifier)"' <<< "$TESTS"
          echo "::endgroup::"

  # ============================================
  # Benchmark Job: Runs the Requested Benchmark
  # ============================================

  benchmark:
    name: "${{ matrix.platform }} - ${{ matrix.test.name }}"
    runs-on: parity-large-t2d
    timeout-minutes: 120
    needs:
      [
        generate-matrix,
        build-chainspec-generator,
        build-polkadot-sdk,
        build-resolc,
      ]
    if: >-
      !cancelled() &&
      needs.generate-matrix.result == 'success' &&
      needs.build-chainspec-generator.result == 'success' &&
      needs.build-polkadot-sdk.result == 'success' &&
      needs.build-resolc.result == 'success' &&
      needs.generate-matrix.outputs.benchmark-count != '0'
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.generate-matrix.outputs.tests) }}
        platform: ${{ fromJSON(needs.generate-matrix.outputs.platforms) }}
    steps:
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
        with:
          rust-toolchain: ${{ inputs.rust-toolchain }}
          solc-version: ${{ inputs.solc-version }}
          resolc-repository: ${{ inputs.resolc-repository }}
          resolc-ref: ${{ inputs.resolc-ref }}
      - name: Checkout resolc-compiler-tests
        uses: actions/checkout@v4
        with:
          repository: paritytech/resolc-compiler-tests
          path: compiler-tests
      - name: Get Retester Binaries
        uses: ./.github/actions/require-binary
        with:
          get-all-binaries: true
          binary-name: retester
          repository: paritytech/revive-differential-tests
          ref: ${{ github.ref_name }}
          profile: production
          packages: |
            revive-dt-core
            revive-dt-report-processor
      - name: Get Runtimes Binaries
        uses: ./.github/actions/require-binary
        with:
          get-all-binaries: true
          binary-name: chain-spec-generator
          repository: ${{ inputs.runtimes-repository }}
          ref: ${{ inputs.runtimes-ref }}
          profile: production
          packages: chain-spec-generator
          features: |
            polkadot
            asset-hub-polkadot
          no-default-features: true
          env: |
            RUSTFLAGS=-Awarnings
            WASM_BUILD_RUSTFLAGS=-Clink-arg=--allow-undefined
      - name: Get Polkadot Binaries
        uses: ./.github/actions/require-binary
        with:
          get-all-binaries: true
          binary-name: polkadot
          repository: ${{ inputs.polkadot-sdk-repository }}
          ref: ${{ inputs.polkadot-sdk-ref }}
          profile: production
          packages: |
            polkadot
            polkadot-parachain-bin
            pallet-revive-eth-rpc
          env: |
            ${{ inputs.use-jit && 'RUSTFLAGS=-Awarnings --cfg revive_jit' || 'RUSTFLAGS=-Awarnings' }}
            WASM_BUILD_RUSTFLAGS=-Clink-arg=--allow-undefined
      - name: Set artifact name
        id: names
        env:
          TEST_NAME: ${{ matrix.test.name }}
        run: |
          NAME="${{ matrix.platform }}--${TEST_NAME}"
          NAME="${NAME//\//-}"
          NAME="${NAME// /-}"
          NAME="${NAME//+/plus}"
          NAME="${NAME//::/--}"
          NAME="${NAME//./-}"
          [[ "$NAME" == *- ]] && NAME="${NAME%-}minus"
          echo "artifact=$NAME" >> "$GITHUB_OUTPUT"
      - name: Create tmpfs workdir
        run: |
          WORKDIR="$PWD/workdir"

          mkdir -p "$WORKDIR"
          sudo mount -t tmpfs -o size=48G,mode=1777,nodev,nosuid tmpfs "$WORKDIR"
          df -h "$WORKDIR"
          findmnt "$WORKDIR"
      - name: Print benchmark versions
        env:
          GITHUB_INPUTS: ${{ toJSON(inputs) }}
        run: |
          set -euo pipefail

          print_version() {
            local binary="$1"

            echo "$binary=$("$binary" --version)"
          }

          echo "# Workflow inputs:"
          jq -r 'to_entries[] | "\(.key)=\(.value)"' <<< "$GITHUB_INPUTS"

          echo
          echo "# Installed binaries:"
          print_version retester
          print_version report-processor
          print_version chain-spec-generator
          print_version polkadot
          print_version polkadot-parachain
          print_version polkadot-prepare-worker
          print_version polkadot-execute-worker
          print_version eth-rpc
          print_version resolc
          print_version solc

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Run benchmarks
        env:
          OVERRIDE_REPETITION_COUNT: ${{ inputs.override-repetition-count }}
          TEST_SPECIFIER: ${{ matrix.test.specifier }}
        run: |
          export TMPDIR="$PWD/workdir"

          additional_args=()

          if [ -n "$OVERRIDE_REPETITION_COUNT" ]; then
            additional_args+=(--benchmark.repetition-count-override "$OVERRIDE_REPETITION_COUNT")
          fi

          export POLKAVM_CORE_PINNING="disabled"

          retester benchmark \
            --log-format json \
            --test "$TEST_SPECIFIER" \
            --platform ${{ matrix.platform }} \
            --working-directory ./workdir \
            --concurrency.number-of-nodes 1 \
            --concurrency.number-of-threads 12 \
            --concurrency.number-of-concurrent-tasks 1000 \
            --zombienet.config-path ./assets/${{ inputs.network }}-assethub-zombienet.toml \
            --zombienet.block-production-timeout-ms 300000 \
            --wallet.additional-keys ${{ inputs.additional-keys }} \
            --eth-rpc.logging-level info \
            --report.file-name report.json \
            "${additional_args[@]}" \
            > ./workdir/retester.log 2>&1
      - name: Upload workdir
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-${{ steps.names.outputs.artifact }}
          path: |
            ./workdir
            !./workdir/**/db/**

  publish:
    name: Publish The Report
    runs-on: parity-large-t2d
    needs:
      - generate-matrix
      - benchmark
    if: >-
      always() &&
      !cancelled() &&
      needs.generate-matrix.outputs.benchmark-count != '0'
    steps:
      - name: Set Report Name
        run: echo "REPORT_NAME=benchmark-$(date -u +%Y-%m-%d-%H%M%S)" >> "$GITHUB_ENV"
      - name: Checkout This Repository
        uses: actions/checkout@v4
      - name: Setup the Machine
        uses: ./.github/actions/setup-benchmark-machine
      - name: Restore Retester
        uses: ./.github/actions/require-binary
        with:
          get-all-binaries: true
          binary-name: retester
          repository: paritytech/revive-differential-tests
          ref: ${{ github.ref_name }}
          profile: production
          packages: |
            revive-dt-core
            revive-dt-report-processor
      - name: Checkout resolc-compiler-tests
        uses: actions/checkout@v4
        with:
          repository: paritytech/resolc-compiler-tests
          path: compiler-tests
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: workdir-*
          path: ./results
      - name: Merge reports
        run: |
          REPORT_ARGS=""
          for dir in ./results/workdir-*/; do
            if [ -f "$dir/report.json" ]; then
              REPORT_ARGS="$REPORT_ARGS --report-path $dir/report.json"
            fi
          done

          if [ -z "$REPORT_ARGS" ]; then
            echo "No reports found to merge"
            exit 1
          fi

          report-processor merge-reports \
            $REPORT_ARGS \
            --output-path ./merged-report.json
      - name: Strip raw data from report for web publishing
        run: |
          jq '
            .execution_information |= map_values(
              .case_reports |= map_values(
                .mode_execution_reports |= map_values(
                  .mined_block_information = {}
                  | .steps |= (if . then map_values(.transactions = {}) else . end)
                )
              )
            )
          ' ./merged-report.json > ./web-report.json
      - name: Generate HTML report
        env:
          REPORT_NAME: ${{ inputs.report-name }}
          REPORT_DESCRIPTION_PREFIX: ${{ inputs.report-description }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          extra_args=()
          if [ -n "$REPORT_NAME" ]; then
            extra_args+=(--name "$REPORT_NAME")
          fi

          if [ -n "$REPORT_DESCRIPTION_PREFIX" ]; then
            description="$REPORT_DESCRIPTION_PREFIX This report was generated by $RUN_URL"
          else
            description="This report was generated by $RUN_URL"
          fi
          extra_args+=(--description "$description")

          report-processor generate-benchmarks-html-report \
            --report-path ./web-report.json \
            --output-path ./benchmark-report.html \
            "${extra_args[@]}"
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
      - name: Add report
        run: |
          mkdir -p gh-pages-dir/reports gh-pages-dir/raw
          cp ./benchmark-report.html "gh-pages-dir/index.html"
          cp ./benchmark-report.html "gh-pages-dir/reports/${REPORT_NAME}.html"
          cp ./web-report.json "gh-pages-dir/raw/${REPORT_NAME}.json"
      - name: Re-index reports
        working-directory: gh-pages-dir
        run: |
          set -euo pipefail

          html_escape() {
            python3 -c 'import html, sys; print(html.escape(sys.argv[1]), end="")' "$1"
          }

          {
            echo '<!doctype html>'
            echo '<html lang="en">'
            echo '<head><meta charset="utf-8"><title>Benchmark Reports</title></head>'
            echo '<body>'
            echo '<ul>'
            for report in reports/*.html; do
              [ -f "$report" ] || continue
              report_name="$(basename "$report")"
              escaped="$(html_escape "$report_name")"
              echo "<li><a href=\"./${escaped}\">${escaped}</a></li>"
            done
            echo '</ul>'
            echo '</body>'
            echo '</html>'
          } > reports/index.html
      - name: Push to gh-pages
        working-directory: gh-pages-dir
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit; skipping push"
            exit 0
          fi
          git commit -m "Update benchmark report"
          git push
