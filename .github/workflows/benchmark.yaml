name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      polkadot_version:
        description: "Polkadot SDK version tag (e.g. polkadot-stable2512-2)"
        required: false
      runtimes_version:
        description: "Runtimes commit hash"
        required: false
      additional_keys:
        description: "Number of additional wallet keys to generate"
        required: false
      resolc_version:
        description: "Resolc compiler version tag (e.g. v0.6.0)"
        required: false
      solc_version:
        description: "Solc compiler version (e.g. v0.8.28)"
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  POLKADOT_VERSION: ${{ inputs.polkadot_version || 'polkadot-stable2512-2' }}
  RUNTIMES_VERSION: ${{ inputs.runtimes_version || '220928aa6e87b11cf2b40a6ad893bdbd6efd87d6' }}
  ADDITIONAL_KEYS: ${{ inputs.additional_keys || '200010' }}
  RESOLC_VERSION: ${{ inputs.resolc_version || 'v0.6.0' }}
  SOLC_VERSION: ${{ inputs.solc_version || 'v0.8.30' }}

permissions:
  contents: write

jobs:
  # ── Build jobs (run in parallel) ─────────────────────────────────────

  build-retester:
    name: Build retester
    runs-on: parity-large
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler llvm clang libclang-dev

      - name: Checkout This Repository
        uses: actions/checkout@v4

      - name: Restore retester cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/retester
            ~/.cargo/bin/report-processor
          key: retester-${{ hashFiles('crates/**', 'assets/**') }}

      - name: Build retester and report-processor
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cargo build --profile production -p revive-dt-core -p revive-dt-report-processor
          cp -t ~/.cargo/bin \
            target/production/retester \
            target/production/report-processor

      - name: Save retester cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/retester
            ~/.cargo/bin/report-processor
          key: retester-${{ hashFiles('crates/**', 'assets/**') }}

  build-chainspec-generator:
    name: Build chainspec-generator
    runs-on: parity-large
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler llvm clang libclang-dev

      - name: Checkout runtimes
        uses: actions/checkout@v4
        with:
          repository: polkadot-fellows/runtimes
          ref: ${{ env.RUNTIMES_VERSION }}

      - name: Restore chainspec-generator cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cargo/bin/chain-spec-generator
          key: chainspec-generator-${{ env.RUNTIMES_VERSION }}

      - name: Build chainspec-generator
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cargo build --locked --profile production \
            --manifest-path chain-spec-generator/Cargo.toml \
            --no-default-features \
            --features polkadot,asset-hub-polkadot,fast-runtime
          cp -t ~/.cargo/bin \
            target/production/chain-spec-generator

      - name: Save chainspec-generator cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cargo/bin/chain-spec-generator
          key: chainspec-generator-${{ env.RUNTIMES_VERSION }}

  build-polkadot-sdk:
    name: Build polkadot-sdk
    runs-on: parity-large
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler llvm clang libclang-dev

      - name: Checkout polkadot-sdk
        uses: actions/checkout@v4
        with:
          repository: paritytech/polkadot-sdk
          ref: ${{ env.POLKADOT_VERSION }}

      - name: Restore polkadot-sdk cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/polkadot
            ~/.cargo/bin/polkadot-prepare-worker
            ~/.cargo/bin/polkadot-execute-worker
            ~/.cargo/bin/polkadot-parachain
            ~/.cargo/bin/eth-rpc
          key: polkadot-sdk-${{ env.POLKADOT_VERSION }}

      - name: Build polkadot-sdk binaries
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          RUSTFLAGS: "-Awarnings"
        run: |
          cargo build --locked --profile production \
            -p polkadot -p polkadot-parachain-bin -p pallet-revive-eth-rpc \
            --features polkadot/fast-runtime \
            --bin polkadot \
            --bin polkadot-prepare-worker \
            --bin polkadot-execute-worker \
            --bin polkadot-parachain \
            --bin eth-rpc
          cp -t ~/.cargo/bin \
            target/production/polkadot \
            target/production/polkadot-prepare-worker \
            target/production/polkadot-execute-worker \
            target/production/polkadot-parachain \
            target/production/eth-rpc

      - name: Save polkadot-sdk cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/polkadot
            ~/.cargo/bin/polkadot-prepare-worker
            ~/.cargo/bin/polkadot-execute-worker
            ~/.cargo/bin/polkadot-parachain
            ~/.cargo/bin/eth-rpc
          key: polkadot-sdk-${{ env.POLKADOT_VERSION }}

  # ── Generate test matrix dynamically ─────────────────────────────────
  generate-matrix:
    name: Generate test matrix
    needs: build-retester
    runs-on: parity-large
    outputs:
      tests: ${{ steps.matrix.outputs.tests }}
    steps:
      - name: Add cargo bin to PATH
        run: |
          mkdir -p "$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Checkout This Repository
        uses: actions/checkout@v4

      - name: Checkout resolc-compiler-tests
        uses: actions/checkout@v4
        with:
          repository: paritytech/resolc-compiler-tests
          path: compiler-tests

      - name: Restore retester cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/retester
            ~/.cargo/bin/report-processor
          key: retester-${{ hashFiles('crates/**', 'assets/**') }}

      - name: Export test specifiers
        id: matrix
        run: |
          TESTS=$(retester export-test-specifiers \
            --test ./compiler-tests/fixtures/solidity/workloads \
            | jq -R . | jq -sc .)
          echo "tests=${TESTS}" >> "$GITHUB_OUTPUT"

  # ── Run benchmarks (one job per test x platform) ─────────────────────
  benchmark:
    name: "${{ matrix.platform }} / ${{ matrix.test }}"
    needs: [generate-matrix, build-chainspec-generator, build-polkadot-sdk]
    runs-on: parity-large
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.generate-matrix.outputs.tests) }}
        platform:
          - lighthouse-geth-evm-solc
          - zombienet-revm-solc
          - zombienet-polkavm-resolc
    steps:
      - name: Set artifact name
        id: names
        run: |
          NAME="${{ matrix.platform }}--${{ matrix.test }}"
          NAME="${NAME//\//-}"
          NAME="${NAME// /-}"
          NAME="${NAME//+/plus}"
          NAME="${NAME//::/--}"
          NAME="${NAME//./-}"
          [[ "$NAME" == *- ]] && NAME="${NAME%-}minus"
          echo "artifact=$NAME" >> "$GITHUB_OUTPUT"

      # ── PATH setup (no Rust toolchain on benchmark runners) ──────────

      - name: Add cargo bin to PATH
        run: |
          mkdir -p "$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # ── External dependencies ─────────────────────────────────────────

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler llvm clang libclang-dev docker.io
          sudo dockerd &
          for i in $(seq 1 15); do
            docker info > /dev/null 2>&1 && break
            sleep 1
          done
          docker info
          sudo chmod 666 /var/run/docker.sock

      - name: Install Kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt-get update
          sudo apt-get install -y kurtosis-cli
          kurtosis engine start

      # ── Checkout repositories ──────────────────────────────────────────

      - name: Checkout This Repository
        uses: actions/checkout@v4

      - name: Checkout resolc-compiler-tests
        uses: actions/checkout@v4
        with:
          repository: paritytech/resolc-compiler-tests
          path: compiler-tests

      # ── Install compilers ───────────────────────────────────────────────

      - name: Install solc
        run: |
          curl -sSLo ~/.cargo/bin/solc \
            "https://github.com/ethereum/solidity/releases/download/${{ env.SOLC_VERSION }}/solc-static-linux"
          chmod +x ~/.cargo/bin/solc

      - name: Install resolc
        run: |
          curl -sSLo ~/.cargo/bin/resolc \
            "https://github.com/paritytech/revive/releases/download/${{ env.RESOLC_VERSION }}/resolc-x86_64-unknown-linux-musl"
          chmod +x ~/.cargo/bin/resolc

      # ── Restore cached binaries ─────────────────────────────────────────

      - name: Restore retester cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/retester
            ~/.cargo/bin/report-processor
          key: retester-${{ hashFiles('crates/**', 'assets/**') }}

      - name: Restore chainspec-generator cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cargo/bin/chain-spec-generator
          key: chainspec-generator-${{ env.RUNTIMES_VERSION }}

      - name: Restore polkadot-sdk cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/polkadot
            ~/.cargo/bin/polkadot-prepare-worker
            ~/.cargo/bin/polkadot-execute-worker
            ~/.cargo/bin/polkadot-parachain
            ~/.cargo/bin/eth-rpc
          key: polkadot-sdk-${{ env.POLKADOT_VERSION }}

      # ── Run benchmarks ───────────────────────────────────────────────────

      - name: Create working directory
        run: mkdir -p ./workdir

      - name: Run benchmarks
        env:
          RUST_LOG: info,retester::differential_benchmarks::watcher=debug,revive_dt_node::provider_utils::batching_layer=debug,revive_dt_node::provider_utils::receipt_retry_layer=debug,revive_dt_core::differential_benchmarks::driver=debug,alloy=off
        run: |
          retester benchmark \
            --log-format json \
            --test "${{ matrix.test }}" \
            --platform ${{ matrix.platform }} \
            --working-directory ./workdir \
            --concurrency.number-of-nodes 1 \
            --concurrency.number-of-threads 12 \
            --concurrency.number-of-concurrent-tasks 1000 \
            --zombienet.config-path ./assets/polkadot-assethub-zombienet.toml \
            --wallet.additional-keys ${{ env.ADDITIONAL_KEYS }} \
            --report.file-name report.json \
            > ./workdir/retester.log 2>&1

      - name: Upload workdir
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdir-${{ steps.names.outputs.artifact }}
          path: ./workdir

  # ── Merge reports and publish to GitHub Pages ────────────────────────
  publish:
    name: Publish Report
    if: always()
    needs: benchmark
    runs-on: parity-large
    permissions:
      contents: write
    steps:
      - name: Add cargo bin to PATH
        run: |
          mkdir -p "$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Checkout This Repository
        uses: actions/checkout@v4

      - name: Checkout resolc-compiler-tests
        uses: actions/checkout@v4
        with:
          repository: paritytech/resolc-compiler-tests
          path: compiler-tests

      - name: Restore retester cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/retester
            ~/.cargo/bin/report-processor
          key: retester-${{ hashFiles('crates/**', 'assets/**') }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: workdir-*
          path: ./results

      - name: Merge reports
        run: |
          REPORT_ARGS=""
          for dir in ./results/workdir-*/; do
            if [ -f "$dir/report.json" ]; then
              REPORT_ARGS="$REPORT_ARGS --report-path $dir/report.json"
            fi
          done

          if [ -z "$REPORT_ARGS" ]; then
            echo "No reports found to merge"
            exit 1
          fi

          report-processor merge-reports \
            $REPORT_ARGS \
            --output-path ./merged-report.json

      - name: Strip raw data from report for web publishing
        run: |
          jq '
            .execution_information |= map_values(
              .case_reports |= map_values(
                .mode_execution_reports |= map_values(
                  .mined_block_information = {}
                  | .steps |= (if . then map_values(.transactions = {}) else . end)
                )
              )
            )
          ' ./merged-report.json > ./web-report.json

      - name: Generate HTML report
        run: |
          REPORT_NAME="benchmark-$(date -u +%Y-%m-%d-%H%M%S)"
          echo "REPORT_NAME=${REPORT_NAME}" >> "$GITHUB_ENV"
          report-processor generate-benchmarks-html-report \
            --report-path ./web-report.json \
            --output-path ./benchmark-report.html

      - name: Compress web report
        run: gzip -9 -k ./web-report.json

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
          lfs: true

      - name: Setup Git LFS
        working-directory: gh-pages-dir
        run: |
          git lfs install
          git lfs track "reports/*.json.gz"
          git lfs track "latest.json.gz"

      - name: Add report
        run: |
          mkdir -p gh-pages-dir/reports
          cp ./benchmark-report.html "gh-pages-dir/index.html"
          cp ./web-report.json.gz "gh-pages-dir/reports/${REPORT_NAME}.json.gz"
          cp ./web-report.json.gz "gh-pages-dir/latest.json.gz"

      - name: Push to gh-pages
        working-directory: gh-pages-dir
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .gitattributes
          git add .
          git commit -m "Update benchmark report"
          git push
